name: Update World Cup Matches

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  update-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd world-cup-assistant
          npm install

      - name: Fetch latest matches
        run: |
          cd world-cup-assistant
          npm run fetch:matches

      - name: Commit updated matches
        run: |
          if git diff --quiet -- world-cup-assistant/data/matches.json; then
            echo "比赛数据没有变化，不创建提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add world-cup-assistant/data/matches.json
          git commit -m "chore: update world cup matches data from openfootball"
          git push

name: Update World Cup Matches

on:
  workflow_dispatch:

  schedule:
    - cron: "0 1 * * *"

  push:
    branches:
      - main
    paths:
      - "world-cup-assistant/**"
      - ".github/workflows/update-matches.yml"

permissions:
  contents: write

concurrency:
  group: update-world-cup-matches
  cancel-in-progress: false

jobs:
  update-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd world-cup-assistant
          npm install

      - name: Fetch latest matches
        run: |
          cd world-cup-assistant
          if npm run fetch:matches; then
            echo "OpenFootball 数据更新成功。"
          else
            echo "::warning::OpenFootball 更新失败，将使用现有 data/matches.json 继续构建。"
            node --input-type=module -e "
              import { readFile } from 'node:fs/promises';
              const matches = JSON.parse(await readFile('data/matches.json', 'utf8'));
              if (!Array.isArray(matches) || matches.length === 0) {
                throw new Error('现有 data/matches.json 无效，停止构建和部署');
              }
              console.log(\`现有比赛数据有效，共 \${matches.length} 场。\`);
            "
          fi

      - name: Build China static mirror
        run: |
          cd world-cup-assistant
          npm run build:cn

      - name: Commit updated matches
        run: |
          if git diff --quiet -- world-cup-assistant/data/matches.json; then
            echo "比赛数据没有变化，不创建提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add world-cup-assistant/data/matches.json
          git commit -m "chore: update world cup matches data from openfootball [skip ci]"
          git push

      - name: Install CloudBase CLI
        run: npm install --global @cloudbase/cli@3.5.6

      - name: Check CloudBase deployment secrets
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          if [ -z "$TCB_SECRET_ID" ] || [ -z "$TCB_SECRET_KEY" ] || [ -z "$TCB_ENV_ID" ]; then
            echo "::error::缺少 CloudBase 部署配置。请添加 TCB_SECRET_ID、TCB_SECRET_KEY 和 TCB_ENV_ID。"
            exit 1
          fi

      - name: Log in to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          tcb login \
            --apiKeyId "$TCB_SECRET_ID" \
            --apiKey "$TCB_SECRET_KEY"

      - name: Deploy China static mirror
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          echo "正在部署 dist-cn/ 到 CloudBase 的 world-cup-assistant-cn/ 路径..."
          tcb hosting deploy \
            ./world-cup-assistant/dist-cn \
            /world-cup-assistant-cn \
            -e "$TCB_ENV_ID"
          echo "CloudBase 国内静态镜像部署完成。"
